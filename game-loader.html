<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>
    <style>
        /* CSS to make the iframe take up the whole screen when in fullscreen mode */
        body { margin: 0; padding: 0; background-color: #000; }
        .fullscreen-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        #game-iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: none; /* hide iframe initially */
        }

        /* Overlay to capture the initial click */
        #click-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            flex-direction: column;
            text-align: center;
        }
        #click-overlay h1 {
            font-size: 2rem;
        }
        #click-overlay p {
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div class="fullscreen-container">
        <div id="click-overlay">
            <h1>Click anywhere to open in fullscreen</h1>
            <p>Press **Esc** to exit fullscreen</p>
            <p><a href="gallery.html" style="color: #00; margin-top: 1rem;"></a></p>
        </div>
        
        <iframe id="game-iframe" src="" allowfullscreen webkitallowfullscreen mozallowfullscreen></iframe>
    </div>

    <script>
        // Get query parameters from URL
        function getQueryParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }

        const overlay = document.getElementById('click-overlay');
        const gameIframe = document.getElementById('game-iframe');
        const container = document.querySelector('.fullscreen-container');

        // Load the game source once the window is ready
        window.onload = () => {
            const gameSrc = getQueryParam('game');
            if (gameSrc) {
                gameIframe.src = gameSrc;
            } else {
                gameIframe.src = 'game1/index.html'; // Default game
            }
        };

        // This is the user interaction handler that triggers fullscreen
        overlay.addEventListener('click', () => {
            // Request fullscreen for the container element
            if (container.requestFullscreen) {
                container.requestFullscreen();
            } else if (container.mozRequestFullScreen) { /* Firefox */
                container.mozRequestFullScreen();
            } else if (container.webkitRequestFullscreen) { /* Chrome, Safari and Opera */
                container.webkitRequestFullscreen();
            } else if (container.msRequestFullscreen) { /* IE/Edge */
                container.msRequestFullscreen();
            }
            
            // Hide the overlay and show the game
            overlay.style.display = 'none';
            gameIframe.style.display = 'block';
        });
    </script>
</body>
</html>
