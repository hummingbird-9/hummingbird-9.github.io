    // --- CORE SEARCH SYSTEM ---
// --- NEW HELPER: Detect if input is a Link or IP ---
    function isUrlOrIp(str) {
      // Regex for IPv4 addresses
      const ipRegex = /^(?:[0-9]{1,3}\.){3}[0-9]{1,3}$/;
      // Regex for URLs (looks for dots, no spaces, or common protocols)
      const urlRegex = /^(https?:\/\/)?([\da-z\.-]+)\.([a-z\.]{2,6})([\/\w \.-]*)*\/?$/;
      
      // Return true if it matches an IP or looks like a valid URL with a domain extension
      return ipRegex.test(str) || (urlRegex.test(str) && str.includes('.'));
    }

    // --- CORE SEARCH SYSTEM (REGENERATED) ---

#context-menu {

#image-modal {

.modal-controls {

}
.close-btn {

}
.close-btn:hover {

}

/* --- IN-APP SITE VIEWER --- */
#site-viewer {

#site-viewer-header {

</head>
