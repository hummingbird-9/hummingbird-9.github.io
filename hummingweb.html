  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAm5xbZUmScuwSJg8AIEH0C2JiaLR7Kg_w",
      authDomain: "hummingsignin.firebaseapp.com",
      projectId: "hummingsignin",
      storageBucket: "hummingsignin.appspot.com",
      messagingSenderId: "215379214606",
      appId: "1:215379214606:web:920175641327cb6519975f",
      measurementId: "G-JJ01B34T1R"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const SERPER_KEY = "f54edce2f81eba9a0ca1eb215421ace425de05d6";
const GEMINI_KEY_PART1 = "AIzaSyDJ9XAieppXG4ZX";
const GEMINI_KEY_PART2 = "9lmJWDk08F9q5bug27w";
const GEMINI_KEY = GEMINI_KEY_PART1 + GEMINI_KEY_PART2;
    const GEMINI_MODEL = "gemini-2.5-flash";

    // UI REFS
    const mainBody = document.getElementById("main-body");
    const queryInput = document.getElementById("query");
    const resultsArea = document.getElementById("results-area");
    const chatStream = document.getElementById("chat-stream");
    const aiChatWindow = document.getElementById("ai-chat-window");

    let mode = "search";
    let chatHistory = [];
    let currentUser = null;

    // wrap URLs with proxy to bypass blocks
    function proxyUrl(url) {
      return `https://corsproxy.io/?${encodeURIComponent(url)}`;
    }

    // Open links inside the app with /search?q=... proxy for external sites
    function openUnblocked(url) {
      const encoded = encodeURIComponent(url);
      // Redirect inside app with search?q= or proxy directly
      window.location.href = `/search?q=${encoded}`;
    }

    // --- AUTHENTICATION ---
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        currentUser = user;
        document.getElementById("user-email-top").textContent = user.email;
        document.getElementById("signin-btn-top").style.display = "none";
        document.getElementById("signout-btn-top").style.display = "inline-block";
        document.getElementById("signin-form").style.display = "none"; // Hide sign-in form after login
        const docSnap = await getDoc(doc(db, "users", user.uid));
        if (docSnap.exists() && docSnap.data().chatHistory) {
          chatHistory = docSnap.data().chatHistory;
          chatStream.innerHTML = chatHistory.map(m => `<div class="msg ${m.role==='user'?'user':'bot'}">${m.parts[0].text}</div>`).join("");
        }
      } else {
        currentUser = null;
        document.getElementById("user-email-top").textContent = '';
        document.getElementById("signin-btn-top").style.display = "inline-block";
        document.getElementById("signout-btn-top").style.display = "none";
        chatHistory = [];
        chatStream.innerHTML = "";
      }
    });

    window.handleSignIn = async () => {
      try {
        await signInWithEmailAndPassword(auth, document.getElementById("email").value, document.getElementById("password").value);
      } catch(e) {
        alert(e.message);
      }
    };
    window.handleSignUp = async () => {
      try {
        await createUserWithEmailAndPassword(auth, document.getElementById("email").value, document.getElementById("password").value);
      } catch(e) {
        alert(e.message);
      }
    };
    window.handleSignOut = () => signOut(auth);

    // --- TAB SYSTEM ---
    window.setTab = (t) => {
      mode = t;
      document.querySelectorAll(".tab").forEach(tab => tab.classList.remove("active"));
      if(t === 'shorts') t = 'videos';
      const targetTab = document.getElementById(`tab-${t}`);
      if(targetTab) targetTab.classList.add("active");
      aiChatWindow.style.display = (mode === "ai") ? "block" : "none";
      resultsArea.style.display = (mode === "ai") ? "none" : "block";
      if (queryInput.value) executeSearch();
    };

    // --- AI CHAT SYSTEM (FIXED) ---
    async function runAiChat(q) {
      chatStream.innerHTML += `<div class="msg user"><b>You:</b> ${q}</div>`;
      chatHistory.push({ role: "user", parts: [{ text: q }] });
      queryInput.value = "";

      try {
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${GEMINI_KEY}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            contents: chatHistory,
            systemInstruction: { parts: [{ text: "You are an expert. Answer thoroughly." }] }
          })
        });

        const data = await response.json();
        if(data.error) throw new Error(data.error.message);

        const reply = data.candidates[0].content.parts[0].text;
        chatStream.innerHTML += `<div class="msg bot"><b>humming[bird]AI:</b> ${reply.replace(/\n/g, '<br>')}</div>`;
        chatHistory.push({ role: "model", parts: [{ text: reply }] });
        aiChatWindow.scrollTop = aiChatWindow.scrollHeight;

        if(currentUser) await setDoc(doc(db, "users", currentUser.uid), { chatHistory }, { merge: true });
      } catch (e) {
        chatStream.innerHTML += `<div class="msg bot" style="color:red">Error: ${e.message}</div>`;
        chatHistory.pop();
      }
    }

async function fetchAiOverview(query) {
  try {
    console.log("AI Overview: starting fetch for query:", query);
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${GEMINI_KEY}`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        contents: [
          {
            parts: [
              {
                text: `Provide a brief AI overview for the following search:\n${query}`
              }
            ]
          }
        ],
        systemInstruction: {
          parts: [{ text: "You are a helpful assistant providing summaries for a custom search engine." }]
        }
      }),
    });
    if (!res.ok) {
      const errTxt = await res.text();
      console.error("AI Overview fetch HTTP error:", res.status, res.statusText, errTxt);
      return null;
    }
    const data = await res.json();
    if (data.error) {
      console.error("AI Overview API error:", data.error);
      return null;
    }
    console.log("AI Overview response data:", data);
    return data.candidates[0].content.parts[0].text;
  } catch (e) {
    console.error("AI Overview fetch exception:", e);
    return null;
  }
}



    // --- CORE SEARCH SYSTEM ---
    // Helper to safely encode URLs for JS single-quote attribute usage
    function jsEscape(str) {
      return encodeURIComponent(str).replace(/'/g, "%27").replace(/"/g, "%22");
    }

async function executeSearch() {
  const q = queryInput.value.trim();
  if (!q) return;
  if (mode === "ai") { await runAiChat(q); return; }

  const aiOverviewEnabled = document.getElementById("ai-check").checked;

  resultsArea.innerHTML = "<div class='loading'>Our hummingbird army is looking for relevant sites...</div>";
  const endpoint = ["images", "videos", "shopping"].includes(mode) ? mode : "search";

  let loadingDiv = null;
  if (mode !== "ai" && aiOverviewEnabled) {
    loadingDiv = document.createElement("div");
    loadingDiv.className = "ai-overview";
    loadingDiv.innerHTML = "<strong>AI Overview:</strong><br><em>Loading AI Overview...</em>";
    resultsArea.prepend(loadingDiv);

    fetchAiOverview(q).then(aiText => {
      if (aiText) {
        loadingDiv.innerHTML = `<strong>AI Overview:</strong><br>${aiText.replace(/\n/g, "<br>")}`;
      } else if (loadingDiv) {
        loadingDiv.remove();
      }
    }).catch(() => {
      if (loadingDiv) loadingDiv.remove();
    });
  }

  try {
    const res = await fetch(`https://google.serper.dev/${endpoint}`, {
      method: "POST",
      headers: { "X-API-KEY": SERPER_KEY, "Content-Type": "application/json" },
      body: JSON.stringify({ q, autocompleted: true }),
    });

    if (!res.ok) {
      const errorText = await res.text();
      throw new Error(`Server error: ${res.status} ${res.statusText} - ${errorText}`);
    }

    const data = await res.json();
    let html = "";

    if (mode === "images") {
      html += `<div class="grid-container">` + data.images.map(img => {
        const safeUrl = jsEscape(img.link);
        return `<div class="card" onclick="openImageModal('${img.imageUrl}', decodeURIComponent('${safeUrl}'))">
          <img src="${img.imageUrl}"><p>${img.title}</p>
        </div>`;
      }).join("") + `</div>`;
    } else if (mode === "shopping") {
      html += `<div class="grid-container">` + data.shopping.map(s => {
        const safeUrl = jsEscape(s.link);
        return `<div class="card"><a href="javascript:void(0)" onclick="openUnblocked(decodeURIComponent('${safeUrl}'))"><img src="${s.imageUrl}"><b>${s.price}</b><p>${s.title}</p></a></div>`;
      }).join("") + `</div>`;
    } else {
      const items = data.organic || data.videos || [];
      html += items.map(i => {
        const safeUrl = jsEscape(i.link);
        const thumbUrl = i.imageUrl || i.thumbnailUrl || (i.pagemap && i.pagemap.cse_image ? i.pagemap.cse_image[0].src : null);
        const thumb = thumbUrl ? `<img src="${thumbUrl}" class="res-thumb" onerror="this.style.display='none'">` : "";
        return `<div class="result-item">
          <div class="res-content">
            <a href="javascript:void(0)" onclick="openUnblocked(decodeURIComponent('${safeUrl}'))">${i.title}</a>
            <p>${i.snippet || i.description || ""}</p>
          </div>
          ${thumb}
        </div>`;
      }).join("");
    }

    if (mode !== "ai" && aiOverviewEnabled && loadingDiv) {
      resultsArea.innerHTML = ""; // clear placeholder
      resultsArea.appendChild(loadingDiv);
      resultsArea.innerHTML += html;
    } else {
      resultsArea.innerHTML = html;
    }

  } catch (e) {
    console.error("Search fetch error:", e);
    resultsArea.innerHTML = `<div style="color:red">Error fetching results: ${e.message}</div>`;
  }
}

    window.doSearch = executeSearch;


    // --- CONTEXT MENU ---
    const ctxMenu = document.getElementById("context-menu");
    document.addEventListener("contextmenu", (e) => {
      e.preventDefault();
      ctxMenu.style.display = "block";
      ctxMenu.style.left = e.pageX + "px";
      ctxMenu.style.top = e.pageY + "px";
    });
    document.addEventListener("click", (e) => {
      if(!ctxMenu.contains(e.target)) ctxMenu.style.display = "none";
    });

    window.toggleThemeMenu = () => {
      const isModern = mainBody.className === "modern";
      mainBody.className = isModern ? "classic" : "modern";
      ctxMenu.style.display = "none";
    };

    window.launchInspector = () => {
      if (window.eruda) { window.eruda.show(); return; }
      const script = document.createElement('script');
      script.src = "//cdn.jsdelivr.net/npm/eruda";
      document.body.appendChild(script);
      script.onload = () => { eruda.init(); eruda.show(); };
      ctxMenu.style.display = "none";
    };

    // --- IMAGE MODAL LOGIC ---
    window.openImageModal = (imgSrc, siteUrl) => {
      document.getElementById('modal-img').src = imgSrc;
      // open link via proxy on button click:
      const modalLink = document.getElementById('modal-link');
      modalLink.href = "javascript:void(0)";
      modalLink.onclick = () => openUnblocked(siteUrl);
      document.getElementById('image-modal').style.display = 'flex';
    };
    window.closeModal = () => document.getElementById('image-modal').style.display = 'none';

    // Make hummingbird logo redirect to /search?q=
    document.addEventListener('DOMContentLoaded', () => {
      const logo = document.querySelector('header .logo-img');
      if (logo) {
        logo.style.cursor = 'pointer';
        logo.onclick = () => {
          const q = document.getElementById('query').value.trim();
          window.location.href = `/search?q=${encodeURIComponent(q)}`;
        };
      }
    });
  </script>

  border: 2px solid var(--emerald);
  border-radius: 10px;
  margin-bottom: 20px;
  box-shadow: 0 0 30px rgba(144, 228, 193, 0.3);
}
.modal-controls {
  display: flex;
  gap: 15px;
}
.close-btn {
  position: absolute;
  top: 20px;
  right: 30px;
  font-size: 40px;
  color: white;
  cursor: pointer;
}
.close-btn:hover {
  color: var(--emerald);
}
  </style>
</head>

<body id="main-body" class="modern">

  <div id="context-menu">
    <div class="ctx-item" onclick="toggleThemeMenu()">Toggle Modern/Old(HTML4)</div>
    <div class="ctx-item" onclick="launchInspector()">Inspect Element</div>
    <div class="ctx-item" onclick="location.reload()">Refresh Search Engine</div>
  </div>

  <div id="image-modal">
    <span class="close-btn" onclick="closeModal()">&times;</span>
    <img id="modal-img" src="">
    <div class="modal-controls">
      <a id="modal-link" href="#" target="_self" class="btn" style="text-decoration:none; background:#000; padding:10px 20px;">Visit Source Website</a>
    </div>
  </div>

  <header><img src="https://uploads.onecompiler.io/447kr4gf2/44f9wbztv/humming%5Bbird%5DTech%20logo%20(6).png" class="logo-img"></header>

  <div id="top-left-controls">
    <div class="mode-switch-container" onclick="toggleThemeMenu()" title="Toggle Modern/Old(HTML4)">
      <span id="mode-text">Modern Style/HTML4 Style</span>
    </div>
    <label style="font-size: 0.8rem; opacity: 0.8; margin-left: 10px;">
      <input type="checkbox" id="ai-check" checked> AI Summaries
    </label>
  </div>

  <div id="top-right-controls">
    <span id="user-email-top"></span>
    <button class="btn" onclick="document.getElementById('signin-form').style.display='block'" id="signin-btn-top">Sign In</button>
    <button class="btn" style="display:none;" id="signout-btn-top" onclick="handleSignOut()">Sign Out</button>
  </div>

  <div id="signin-form" style="display:none;">
    <input type="email" id="email" placeholder="Email" autocomplete="username">
    <input type="password" id="password" placeholder="Password" autocomplete="current-password">
    <button class="btn" style="width:100%; margin-bottom:10px;" onclick="handleSignIn()">Login</button>
    <button class="btn" style="width:100%; background:#222;" onclick="handleSignUp()">Sign Up</button>
  </div>

  <div id="search-container">
    <div class="search-box">
      <input type="text" id="query" placeholder="Search the web" onkeypress="if(event.key==='Enter') doSearch()">
      <button onclick="doSearch()" class="btn">Search</button>
    </div>

    <div id="tabs">
      <div class="tab active" id="tab-search" onclick="setTab('search')">All</div>
      <div class="tab" id="tab-ai" onclick="setTab('ai')">AI mode</div>
      <div class="tab" id="tab-images" onclick="setTab('images')">Images</div>
      <div class="tab" id="tab-videos" onclick="setTab('videos')">Videos</div>
      <div class="tab" id="tab-shorts" onclick="setTab('videos')">Shorts</div>
      <div class="tab" id="tab-shopping" onclick="setTab('shopping')">Shopping</div>
      <div class="tab" id="tab-forums" onclick="setTab('search')">Forums</div>
    </div>

    <div id="ai-chat-window" style="display:none;"><div id="chat-stream"></div></div>
    <div id="results-area"></div>
  </div>

</body>
</html>
