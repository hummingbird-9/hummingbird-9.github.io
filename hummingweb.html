<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>humming[bird]Tech search engine</title>

  <script src="assets/mathematics/bundle.js"></script>
  <script src="assets/mathematics/config.js"></script>

  <script>
    // GLOBAL FIX: Required for the HTML buttons to find the search function
    function doSearch() {
      window.dispatchEvent(new CustomEvent('execute-humming-search'));
    }

    // SERVICE WORKER
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('assets/mathematics/sw.js', {
          scope: '/uv/service/' 
        }).then(() => console.log("HummingProxy: Online")).catch(e => console.error(e));
      });
    }
  </script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAm5xbZUmScuwSJg8AIEH0C2JiaLR7Kg_w",
      authDomain: "hummingsignin.firebaseapp.com",
      projectId: "hummingsignin",
      storageBucket: "hummingsignin.appspot.com",
      messagingSenderId: "215379214606",
      appId: "1:215379214606:web:920175641327cb6519975f",
      measurementId: "G-JJ01B34T1R"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const SERPER_KEY = "f54edce2f81eba9a0ca1eb215421ace425de05d6";
    const GEMINI_KEY = "AIzaSy" + "DJ9XAieppXG4ZX" + "9lmJWDk08F9q5bug27w";
    const GEMINI_MODEL = "gemini-1.5-flash"; // Fixed version string

    // UI REFS
    const mainBody = document.getElementById("main-body");
    const queryInput = document.getElementById("query");
    const resultsArea = document.getElementById("results-area");
    const chatStream = document.getElementById("chat-stream");
    const aiChatWindow = document.getElementById("ai-chat-window");

    let mode = "search";
    let chatHistory = [];
    let currentUser = null;

    // --- PROXY VIEWER ---
    window.openUnblocked = (url) => {
      if (typeof __uv$config !== 'undefined') {
        document.getElementById("site-iframe").src = __uv$config.prefix + __uv$config.encodeUrl(url);
        document.getElementById("site-viewer").style.display = "flex";
      } else {
        alert("Proxy engine still starting...");
      }
    };
    window.closeSiteViewer = () => {
      document.getElementById("site-viewer").style.display = "none";
      document.getElementById("site-iframe").src = "";
    };

    // --- AUTHENTICATION ---
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        currentUser = user;
        document.getElementById("user-email-top").textContent = user.email;
        document.getElementById("signin-btn-top").style.display = "none";
        document.getElementById("signout-btn-top").style.display = "inline-block";
        document.getElementById("signin-form").style.display = "none";
        const docSnap = await getDoc(doc(db, "users", user.uid));
        if (docSnap.exists() && docSnap.data().chatHistory) {
          chatHistory = docSnap.data().chatHistory;
          chatStream.innerHTML = chatHistory.map(m => `<div class="msg ${m.role==='user'?'user':'bot'}">${m.parts[0].text}</div>`).join("");
        }
      } else {
        currentUser = null;
        document.getElementById("user-email-top").textContent = '';
        document.getElementById("signin-btn-top").style.display = "inline-block";
        document.getElementById("signout-btn-top").style.display = "none";
        chatHistory = [];
        chatStream.innerHTML = "";
      }
    });

    window.handleSignIn = async () => {
      try { await signInWithEmailAndPassword(auth, document.getElementById("email").value, document.getElementById("password").value); } catch(e) { alert(e.message); }
    };
    window.handleSignUp = async () => {
      try { await createUserWithEmailAndPassword(auth, document.getElementById("email").value, document.getElementById("password").value); } catch(e) { alert(e.message); }
    };
    window.handleSignOut = () => signOut(auth);

    // --- TAB SYSTEM ---
    window.setTab = (t) => {
      mode = t;
      document.querySelectorAll(".tab").forEach(tab => tab.classList.remove("active"));
      const targetTab = document.getElementById(`tab-${t === 'shorts' ? 'videos' : t}`);
      if(targetTab) targetTab.classList.add("active");
      aiChatWindow.style.display = (mode === "ai") ? "block" : "none";
      resultsArea.style.display = (mode === "ai") ? "none" : "block";
    };

    // --- SEARCH SYSTEM ---
    async function executeSearch() {
      const q = queryInput.value.trim();
      if (!q) return;

      if (/^(https?:\/\/)?([\da-z\.-]+)\.([a-z\.]{2,6})/.test(q)) {
        window.openUnblocked(q.startsWith('http') ? q : 'https://' + q);
        return;
      }

      if (mode === "ai") { await runAiChat(q); return; }

      resultsArea.innerHTML = "<div class='loading'>Hummingbirds are searching...</div>";
      const endpoint = ["images", "videos", "shopping"].includes(mode) ? mode : "search";

      try {
        const res = await fetch(`https://google.serper.dev/${endpoint}`, {
          method: "POST",
          headers: { "X-API-KEY": SERPER_KEY, "Content-Type": "application/json" },
          body: JSON.stringify({ q, autocompleted: true })
        });
        const data = await res.json();
        renderResults(data);
      } catch (e) { resultsArea.innerHTML = "Error fetching results."; }
    }

    function renderResults(data) {
      let html = "";
      // AI Overview
      if (mode === "search" && document.getElementById("ai-check").checked) {
        const overview = data.aiOverview?.answer || data.answerBox?.snippet;
        if (overview) html += `<div class="ai-overview"><strong>AI Overview:</strong><p>${overview}</p></div>`;
      }
      
      // Organic / Image / Shopping
      const items = data.organic || data.images || data.shopping || data.videos || [];
      html += items.map(i => {
        if (mode === "images") {
          return `<div class="card" onclick="openImageModal('${i.imageUrl}', '${i.link}')"><img src="${i.imageUrl}"><p>${i.title}</p></div>`;
        }
        return `<div class="result-item">
          <a href="${i.link}" onclick="event.preventDefault(); window.openUnblocked('${i.link}');">${i.title}</a>
          <p>${i.snippet || ""}</p>
        </div>`;
      }).join("");
      
      resultsArea.innerHTML = mode === "images" ? `<div class="grid-container">${html}</div>` : html;
    }

    async function runAiChat(q) {
      chatStream.innerHTML += `<div class="msg user"><b>You:</b> ${q}</div>`;
      chatHistory.push({ role: "user", parts: [{ text: q }] });
      try {
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${GEMINI_KEY}`, {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ contents: chatHistory.map(m => ({ role: m.role === "bot" ? "model" : "user", parts: m.parts })) })
        });
        const data = await response.json();
        const reply = data.candidates[0].content.parts[0].text;
        chatStream.innerHTML += `<div class="msg bot"><b>hummingbird:</b> ${reply}</div>`;
        chatHistory.push({ role: "model", parts: [{ text: reply }] });
      } catch (e) { console.error(e); }
    }

    // Listeners & Inspector
    window.addEventListener('execute-humming-search', executeSearch);
    window.toggleThemeMenu = () => {
      mainBody.className = mainBody.className === "modern" ? "classic" : "modern";
    };
    window.launchInspector = () => {
      const script = document.createElement('script');
      script.src = "//cdn.jsdelivr.net/npm/eruda";
      document.body.appendChild(script);
      script.onload = () => { eruda.init(); eruda.show(); };
    };

    // Modal Logic
    window.openImageModal = (imgSrc, siteUrl) => {
      document.getElementById('modal-img').src = imgSrc;
      document.getElementById('modal-link').onclick = (e) => { e.preventDefault(); openUnblocked(siteUrl); };
      document.getElementById('image-modal').style.display = 'flex';
    };
    window.closeModal = () => document.getElementById('image-modal').style.display = 'none';

  </script>

  <style>
    :root { --emerald: #90E4C1; --bg-modern: #051a05; --win-teal: #008080; --win-grey: #c0c0c0; }
    body.modern {
      background: linear-gradient(135deg, #0a2e0a, #1a5d1a, #0a2e0a, #1a5d1a);
      background-size: 400% 400%; animation: gradientBG 20s ease infinite;
      color: #fff; font-family: 'Inter', sans-serif; padding: 180px 20px 40px 20px; margin: 0;
    }
    @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    
    /* Global search items */
    .result-item { margin-bottom: 25px; max-width: 800px; }
    body.modern .result-item a { color: var(--emerald); font-size: 1.25rem; text-decoration: none; font-weight: 600; }
    
    body.classic { background: var(--win-grey); color: #000; font-family: "Tahoma", sans-serif; padding: 180px 20px 40px 20px; margin: 0; }
    body.classic .result-item { background: #fff; border: 2px inset #fff; padding: 10px; }
    
    #search-container { width: 100%; max-width: 850px; position: relative; }
    .search-box { display: flex; gap: 10px; margin-bottom: 20px; }
    #query { flex: 1; padding: 15px; border-radius: 12px; border: 2px solid var(--emerald); background: rgba(0,0,0,0.6); color: #fff; }
    
    #tabs { display: flex; gap: 15px; justify-content: center; margin-bottom: 20px; }
    .tab { cursor: pointer; opacity: 0.7; font-weight: bold; }
    .tab.active { opacity: 1; color: var(--emerald); border-bottom: 2px solid var(--emerald); }

    /* Site Viewer */
    #site-viewer { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #fff; z-index: 1000000; flex-direction: column; }
    #site-viewer-header { background: #111; padding: 10px; display: flex; justify-content: space-between; color: var(--emerald); }
    #site-iframe { flex: 1; border: none; }
