<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Home - Classroom</title>
        <link rel="icon" type="image/png" href="https://upload.wikimedia.org/wikipedia/commons/thumb/1/19/Google_Classroom_Logo.svg/960px-Google_Classroom_Logo.svg.png"
    <link rel="stylesheet" href="style.css" />
</head>

<body class="dark-mode">
    <h1>humming[bird]Tech</h1>
    <input type="text" id="searchBar" placeholder="Search..." />
    <div id="topControls">
        <div id="dataButtons">
            <button onclick="saveData()">Save Data</button>
            <button onclick="document.getElementById('file').click()">Load Data</button>
            <input type="file" id="file" style="display:none" onchange="loadData(event)" />
        </div>
        <select id="sortOptions">
            <option value="name">sort by Nameㅤ</option>
            <option value="id">sort by Idㅤ</option>
            <option value="popular">sort by Popularityㅤ</option>
        </select>
    </div>
    <div class="zone-wrapper">
        <div id="zoneCount" class="zone-count"></div>
        <div id="container">Loading...</div>
    </div>
    <div id="zoneViewer">
        <div id="zoneInfo">
            <div id="zoneTitle">
                <span id="zoneName"></span> <span id="zoneId"></span>
            </div>
            <div id="controls">
                <button onclick="closeZone()">Close</button>
                <button onclick="fullscreenZone()">Fullscreen</button>
                <button onclick="aboutBlank()">about:blank (opens fullscreen in a new tab)</button>
            </div>
        </div>
        <iframe id="zoneFrame"></iframe>
    </div>
    <button id="darkModeToggle">Toggle Dark Mode</button>
    <script src="script.js"></script>
</body>

</html>
