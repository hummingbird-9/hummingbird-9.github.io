<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>humming[bird]Tech</title>

  <style>
    /* --- Your Original Styles --- */
    body {
      margin: 0;
      padding: 20px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: linear-gradient(135deg, #0a2e0a, #1a5d1a, #0a2e0a, #1a5d1a);
      background-size: 400% 400%;
      animation: gradientBG 20s ease infinite;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: white;
      text-align: center;
      justify-content: flex-start;
      padding-top: 40px;
      position: relative;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    button {
      background: rgba(255, 255, 255, 0.15);
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.4);
      color: #e0f7e0;
      cursor: pointer;
      font-size: 18px;
      font-weight: 600;
      margin: 10px 8px;
      padding: 14px 40px;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.4);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.7), 0 8px 32px 0 rgba(0, 255, 45, 0.15);
      backdrop-filter: saturate(180%) blur(10px);
      -webkit-backdrop-filter: saturate(180%) blur(10px);
      transition: transform 0.3s ease, background 0.3s ease;
      min-width: 180px;
      user-select: none;
    }

    button:hover {
      background: rgba(255, 255, 255, 0.1);
      transform: scale(1.05);
      outline: none;
    }

    /* --- NEW: HOVER WARNING LOGIC --- */
     #warning-text {
    font-size: 1.1rem;
    color: #ff4d4d;
    opacity: 0; 
    transition: opacity 0.3s ease;
    max-width: 600px;
    
    /* This part prevents the gap */
    position: absolute; 
    top: 50%; /* Adjust this to move it up or down */
    pointer-events: none; /* Mouse can click through it */
  }

  /* Shows the warning when the gallery button is hovered */
  #gallery-btn:hover ~ #warning-text {
    opacity: 1;
  }
  
  /* Adds a tiny bit of space between buttons without the giant gap */
  button {
    margin: 10px 0; 
  }

  </style>
</head>

<body>

  <!-- Logo at the top -->
  <h1><img src="https://uploads.onecompiler.io/447kr4gf2/44f9wbztv/humming%5Bbird%5DTech%20logo%20(4).png" alt="Logo"></h1>

  <!-- Navigation Buttons -->
  <button id="gallery-btn" onclick="location.href='gallery.html'">Gallery of ports, flash games, and other HTMLs</button>
  
  <!-- THE WARNING: Moved here and styled with ID -->
  <h3 id="warning-text">ONLY FOR USE OUTSIDE OF CLASS</h3>

  <button onclick="location.href='hummingweb.html'">Search Engine</button>
  <button onclick="alert('Made by Oliver Boyd (hummingbird_9). humming[bird]Tech Version 1.8.3')">About</button>
  <button onclick="location.href='ww3.html'">WW3 Trailer</button>

  <script>
    function checkClassStatus() {
      // Changed to .com since you mentioned they block that specifically in class
      fetch('https://onecompiler.com', { mode: 'no-cors' })
        .then(() => {
          console.log("Not in class.");
          document.getElementById('gallery-btn').style.display = 'inline-block';
        })
        .catch(() => {
          console.log("Active Class detected! Hiding Gallery.");
          document.getElementById('gallery-btn').style.display = 'none';
          // Hide the warning text too since the button is gone
          document.getElementById('warning-text').style.display = 'none';
        });
    }
    checkClassStatus();
  </script>
</body>

</html>
