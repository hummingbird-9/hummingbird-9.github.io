<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>localhost</title>
    <style>
        body {
            background-color: #f7f8f9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
        }
        .main-frame {
            margin: 0 auto;
            max-width: 490px;
            padding-top: 100px;
            padding-left: 40px;
            padding-right: 40px;
        }
        .icon {
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="w3.org" width="72" height="72" viewBox="0 0 24 24" fill="%239aa0a6"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>');
            background-repeat: no-repeat;
            background-size: 72px;
            height: 72px;
            width: 72px;
            margin-bottom: 30px;
        }
        h1 {
            color: #202124;
            font-size: 22px;
            font-weight: 500;
            line-height: 28px;
            margin-bottom: 16px;
            margin-top: 0;
            word-break: break-word;
        }
        p {
            color: #5f6368;
            font-size: 14px;
            line-height: 20px;
            margin-top: 0;
            margin-bottom: 16px;
        }
        .suggestions {
            margin-top: 18px;
            padding-left: 20px;
        }
        .suggestions > li {
            color: #5f6368;
            font-size: 14px;
            line-height: 20px;
            margin-bottom: 8px;
        }
        .error-code {
            color: #5f6368;
            font-size: 12px;
            margin-top: 35px;
            text-transform: uppercase;
        }
        .button-row {
            margin-top: 24px;
        }
        .blue-button {
            background-color: #1a73e8;
            border: none;
            border-radius: 4px;
            box-sizing: border-box;
            color: #fff;
            cursor: pointer;
            display: inline-block;
            font-size: 14px;
            font-weight: 500;
            height: 36px;
            line-height: 36px;
            padding: 0 24px;
            text-align: center;
            vertical-align: middle;
        }
        .blue-button:hover {
            background-color: #1557b0;
        }
    </style>
</head>
<body>
    <div class="main-frame">
        <div class="icon"></div>
        <h1>This site can’t be reached</h1>
        <p><strong>localhost</strong> refused to connect.</p>
        <p>Try:</p>
        <ul class="suggestions">
            <li>Checking the connection</li>
            <li>Checking the proxy and the firewall</li>
        </ul>
        <div class="button-row">
            <button class="blue-button" onclick="window.location.reload();">Reload</button>
        </div>
        <div class="error-code">ERR_CONNECTION_REFUSED</div>
    </div>
</body>
</html>
