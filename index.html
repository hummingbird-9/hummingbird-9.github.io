<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Game Gallery</title>
    <link rel="stylesheet" href="style.css">
    <!-- Using a common monospaced font similar to gn-math's aesthetic -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <div class="container">
            <h1>My Game Gallery</h1>
            <nav>
                <a href="#gallery">Gallery</a>
                <a href="https://github.com/yourusername/yourreponame" target="_blank">GitHub Repo</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <section id="gallery" class="game-grid">
            <!-- Game Cards will be inserted here -->

            <!-- Example Game Card 1: Replace with your game details -->
            <a href="games/game1/index.html" class="game-card" target="_blank">
                <img src="images/thumbnail1.png" alt="Thumbnail for Game 1">
                <div class="game-info">
                    <h2>Game Title One</h2>
                    <p>A short description of the game. Click to play in a new fullscreen window.</p>
                </div>
            </a>

            <!-- Example Game Card 2: Replace with your game details -->
            <a href="games/game2/index.html" class="game-card" target="_blank">
                <img src="images/thumbnail2.png" alt="Thumbnail for Game 2">
                <div class="game-info">
                    <h2>Game Title Two</h2>
                    <p>Another description for the second game.</p>
                </div>
            </a>

            <!-- Add more game cards as needed following the same structure -->

        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2024 My Game Gallery. Hosted on GitHub Pages.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
