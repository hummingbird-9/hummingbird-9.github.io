<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: #e0f7fa;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .loading-container {
            text-align: center;
            max-width: 80%;
        }

        .loading-image {
            width: 300px;
            height: auto;
            margin-bottom: 30px;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(92, 106, 196, 0.5);
        }

        .loading-bar-container {
            width: 100%;
            height: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .loading-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(to right, #00b09b, #96c93d);
            border-radius: 10px;
            transition: width 0.3s ease;
        }

        .loading-text {
            font-size: 1.2rem;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="loading-container">
        <img src="images/loading-screen.png" alt="Loading..." class="loading-image">
        <div class="loading-bar-container">
            <div class="loading-bar"></div>
        </div>
        <p class="loading-text">Loading Game...</p>
    </div>

    <script>
        // Simulate loading progress
        let progress = 0;
        const loadingBar = document.querySelector('.loading-bar');
        
        const interval = setInterval(() => {
            progress += Math.floor(Math.random() * 10) + 1;
            if (progress >= 100) {
                progress = 100;
                clearInterval(interval);
                
                // Redirect after loading completes
                setTimeout(() => {
                    window.location.href = 'game.html'; // Replace with actual game URL
                }, 500);
            }
            loadingBar.style.width = `${progress}%`;
        }, 200);
    </script>
</body>
</html>
